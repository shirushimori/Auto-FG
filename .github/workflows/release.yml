name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-gnu
      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y libgtk-3-dev libwebkit2gtk-4.1-dev libunrar-dev librsvg2-bin
      - name: Build
        run: cargo build --release
      - name: Package tarball
        run: |
          mkdir -p release
          cp target/release/Ffast-auto-downloader release/
          cp target/release/get-links release/
          cp target/release/download release/
          cp setup.sh release/
          cp LICENSE README.md release/
          cd release && tar czf ../Auto-FG-x86_64-linux.tar.gz *
      - name: Setup appimagetool
        run: |
          sudo apt install -y fuse
          curl -sLo appimagetool.AppImage \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool.AppImage
          ./appimagetool.AppImage --appimage-extract > /dev/null
          sudo mv squashfs-root/usr/bin/appimagetool /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool
      - name: Build AppImage
        run: |
          rsvg-convert -w 256 -h 256 assets/icon.svg -o assets/icon.png
          APPDIR=target/Auto-FG.AppDir
          mkdir -p "$APPDIR/usr/bin"
          cp target/release/Ffast-auto-downloader "$APPDIR/usr/bin/auto-fg"
          cp assets/icon.png "$APPDIR/auto-fg.png"
          cat > "$APPDIR/auto-fg.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Auto-FG
          Exec=auto-fg
          Icon=auto-fg
          Categories=Utility;
          Terminal=false
          EOF
          cat > "$APPDIR/AppRun" << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/auto-fg" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"
          appimagetool "$APPDIR" Auto-FG-x86_64.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: Auto-FG-x86_64-linux
          path: Auto-FG-x86_64-linux.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: Auto-FG-x86_64.AppImage
          path: Auto-FG-x86_64.AppImage

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-pc-windows-msvc
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path release -Force
          Copy-Item "target\x86_64-pc-windows-msvc\release\Ffast-auto-downloader.exe" -Destination "release\"
          Copy-Item "target\x86_64-pc-windows-msvc\release\get-links.exe" -Destination "release\"
          Copy-Item "target\x86_64-pc-windows-msvc\release\download.exe" -Destination "release\"
          Copy-Item "setup.bat" -Destination "release\"
          Copy-Item "LICENSE", "README.md" -Destination "release\"
          Compress-Archive -Path "release\*" -DestinationPath "setup_x64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: setup_x64
          path: setup_x64.zip

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-unknown-linux-gnu
      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y libgtk-3-dev libwebkit2gtk-4.1-dev libunrar-dev librsvg2-bin file
      - name: Build
        run: cargo build --release
      - name: Package tarball
        run: |
          mkdir -p release
          cp target/release/Ffast-auto-downloader release/
          cp target/release/get-links release/
          cp target/release/download release/
          cp setup.sh release/
          cp LICENSE README.md release/
          cd release && tar czf ../Auto-FG-aarch64-linux.tar.gz *
      - name: Setup appimagetool
        run: |
          sudo apt install -y fuse
          curl -sLo appimagetool.AppImage \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-aarch64.AppImage"
          chmod +x appimagetool.AppImage
          ./appimagetool.AppImage --appimage-extract > /dev/null
          sudo mv squashfs-root/usr/bin/appimagetool /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool
      - name: Build AppImage
        run: |
          rsvg-convert -w 256 -h 256 assets/icon.svg -o assets/icon.png
          APPDIR=target/Auto-FG.AppDir
          mkdir -p "$APPDIR/usr/bin"
          cp target/release/Ffast-auto-downloader "$APPDIR/usr/bin/auto-fg"
          cp assets/icon.png "$APPDIR/auto-fg.png"
          cat > "$APPDIR/auto-fg.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Auto-FG
          Exec=auto-fg
          Icon=auto-fg
          Categories=Utility;
          Terminal=false
          EOF
          cat > "$APPDIR/AppRun" << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/auto-fg" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"
          appimagetool "$APPDIR" Auto-FG-aarch64.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: Auto-FG-aarch64-linux
          path: Auto-FG-aarch64-linux.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: Auto-FG-aarch64.AppImage
          path: Auto-FG-aarch64.AppImage

  build-windows-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-pc-windows-msvc
      - name: Build
        run: cargo build --release --target aarch64-pc-windows-msvc
      - name: Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path release -Force
          Copy-Item "target\aarch64-pc-windows-msvc\release\Ffast-auto-downloader.exe" -Destination "release\"
          Copy-Item "target\aarch64-pc-windows-msvc\release\get-links.exe" -Destination "release\"
          Copy-Item "target\aarch64-pc-windows-msvc\release\download.exe" -Destination "release\"
          Copy-Item "setup.bat" -Destination "release\"
          Copy-Item "LICENSE", "README.md" -Destination "release\"
          Compress-Archive -Path "release\*" -DestinationPath "setup_arm64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: setup_arm64
          path: setup_arm64.zip

  create-release:
    needs: [build-linux, build-linux-arm64, build-windows-x64, build-windows-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/Auto-FG-x86_64-linux/Auto-FG-x86_64-linux.tar.gz
            artifacts/Auto-FG-x86_64.AppImage/Auto-FG-x86_64.AppImage
            artifacts/Auto-FG-aarch64-linux/Auto-FG-aarch64-linux.tar.gz
            artifacts/Auto-FG-aarch64.AppImage/Auto-FG-aarch64.AppImage
            artifacts/setup_x64/setup_x64.zip
            artifacts/setup_arm64/setup_arm64.zip
          draft: false
          prerelease: false
